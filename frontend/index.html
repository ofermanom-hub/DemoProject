<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Enterprise Onboarding Simulator</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d1b2a;
      --surface: #1a2d42;
      --surface2: #162436;
      --border: rgba(255,255,255,.08);
      --teal: #6ee7c5;
      --teal-dim: rgba(110,231,197,.15);
      --red: #f87171;
      --yellow: #fbbf24;
      --green: #34d399;
      --text: #e2e8f0;
      --muted: rgba(255,255,255,.35);
      --critical: #f87171;
      --high: #fb923c;
      --medium: #fbbf24;
      --low: #34d399;
    }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 18px 32px;
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .logo { font-size: 28px; }
    header h1 { font-size: 18px; font-weight: 700; color: var(--teal); }
    header p { font-size: 12px; color: var(--muted); margin-top: 2px; }

    /* ── Layout ── */
    .container { max-width: 1280px; margin: 0 auto; padding: 28px 24px; }

    /* ── Form card ── */
    .form-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 24px;
      margin-bottom: 24px;
    }
    .form-card h2 { font-size: 14px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 18px; }
    .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 16px; margin-bottom: 18px; }
    .field label { display: block; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .06em; color: var(--muted); margin-bottom: 6px; }
    .field input, .field textarea, .field select {
      width: 100%; background: var(--bg); border: 1px solid rgba(255,255,255,.1);
      border-radius: 8px; padding: 10px 12px; color: var(--text); font-size: 14px;
      font-family: inherit; outline: none; transition: border-color .15s;
    }
    .field input:focus, .field textarea:focus, .field select:focus { border-color: var(--teal); }
    .field textarea { resize: vertical; min-height: 72px; }

    .run-btn {
      display: flex; align-items: center; justify-content: center; gap: 8px;
      background: var(--teal); color: #0d1b2a; border: none; border-radius: 10px;
      padding: 12px 28px; font-size: 15px; font-weight: 700; cursor: pointer;
      font-family: inherit; transition: background .15s, transform .1s;
    }
    .run-btn:hover { background: #5dd4b0; }
    .run-btn:active { transform: scale(.97); }
    .run-btn:disabled { opacity: .4; cursor: not-allowed; transform: none; }

    /* ── Output grid ── */
    .output-section { display: none; gap: 20px; }
    .output-section.visible { display: grid; grid-template-columns: 380px 1fr; }

    @media (max-width: 900px) {
      .output-section.visible { grid-template-columns: 1fr; }
    }

    /* ── Log panel ── */
    .log-panel {
      background: #0a1520;
      border: 1px solid var(--border);
      border-radius: 16px;
      display: flex; flex-direction: column;
      overflow: hidden;
      max-height: 680px;
    }
    .log-header {
      padding: 12px 16px;
      background: var(--surface2);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 8px;
    }
    .dot { width: 10px; height: 10px; border-radius: 50%; }
    .dot.red { background: #f87171; }
    .dot.yellow { background: #fbbf24; }
    .dot.green { background: #34d399; }
    .log-title { font-size: 12px; color: var(--muted); margin-left: 4px; }
    .log-body {
      flex: 1; overflow-y: auto; padding: 14px 16px;
      font-family: 'Courier New', monospace; font-size: 12px; line-height: 1.7;
      color: #a3e6d0;
      white-space: pre-wrap; word-break: break-word;
    }
    .log-body::-webkit-scrollbar { width: 4px; }
    .log-body::-webkit-scrollbar-thumb { background: rgba(255,255,255,.1); border-radius: 2px; }
    .cursor { display: inline-block; width: 8px; height: 14px; background: var(--teal); animation: blink .8s step-end infinite; vertical-align: text-bottom; }
    @keyframes blink { 50% { opacity: 0; } }

    /* ── Results panel ── */
    .results-panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
      display: flex; flex-direction: column;
    }
    .tabs {
      display: flex;
      border-bottom: 1px solid var(--border);
      background: var(--surface2);
      overflow-x: auto;
    }
    .tab {
      padding: 12px 20px; font-size: 13px; font-weight: 600; color: var(--muted);
      border: none; background: none; cursor: pointer; font-family: inherit;
      white-space: nowrap; border-bottom: 2px solid transparent;
      transition: color .15s, border-color .15s;
    }
    .tab.active { color: var(--teal); border-bottom-color: var(--teal); }
    .tab-content { flex: 1; overflow-y: auto; padding: 20px; }
    .tab-content::-webkit-scrollbar { width: 4px; }
    .tab-content::-webkit-scrollbar-thumb { background: rgba(255,255,255,.1); border-radius: 2px; }

    .placeholder {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      height: 200px; color: var(--muted); font-size: 13px; gap: 10px;
    }
    .placeholder-icon { font-size: 36px; }

    /* ── Architecture cards ── */
    .arch-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 12px; }
    .arch-card {
      background: var(--bg); border-radius: 12px; padding: 14px 16px;
      border-left: 3px solid var(--teal); border: 1px solid var(--border);
      border-left-width: 3px;
    }
    .arch-card.critical { border-left-color: var(--critical); }
    .arch-card.high { border-left-color: var(--high); }
    .arch-card.medium { border-left-color: var(--medium); }
    .arch-name { font-size: 13px; font-weight: 700; color: var(--text); margin-bottom: 4px; }
    .arch-type { font-size: 11px; color: var(--teal); text-transform: uppercase; letter-spacing: .05em; margin-bottom: 8px; }
    .arch-desc { font-size: 12px; color: var(--muted); line-height: 1.5; margin-bottom: 10px; }
    .badge {
      display: inline-block; padding: 2px 8px; border-radius: 20px;
      font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .05em;
    }
    .badge.critical { background: rgba(248,113,113,.15); color: var(--critical); }
    .badge.high { background: rgba(251,146,60,.15); color: var(--high); }
    .badge.medium { background: rgba(251,191,36,.15); color: var(--medium); }
    .badge.low { background: rgba(52,211,153,.15); color: var(--low); }

    /* ── Risk table ── */
    .risk-table { width: 100%; border-collapse: collapse; font-size: 13px; }
    .risk-table th {
      text-align: left; padding: 10px 12px; font-size: 11px; font-weight: 700;
      text-transform: uppercase; letter-spacing: .06em; color: var(--muted);
      border-bottom: 1px solid var(--border);
    }
    .risk-table td { padding: 10px 12px; border-bottom: 1px solid rgba(255,255,255,.04); vertical-align: top; }
    .risk-table tr:hover td { background: rgba(255,255,255,.02); }
    .risk-name { font-weight: 600; color: var(--text); }
    .mitigation { color: var(--muted); font-size: 12px; line-height: 1.5; }

    /* ── Onboarding timeline ── */
    .timeline { position: relative; padding-left: 24px; }
    .phase-group { margin-bottom: 24px; }
    .phase-label {
      font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .07em;
      color: var(--teal); margin-bottom: 12px; display: flex; align-items: center; gap: 8px;
    }
    .phase-label::after { content: ''; flex: 1; height: 1px; background: var(--teal-dim); }
    .timeline-item {
      position: relative; padding: 10px 14px; background: var(--bg);
      border-radius: 10px; margin-bottom: 8px; border: 1px solid var(--border);
    }
    .timeline-item::before {
      content: ''; position: absolute; left: -16px; top: 50%; transform: translateY(-50%);
      width: 8px; height: 8px; border-radius: 50%; background: var(--teal);
      border: 2px solid var(--bg);
    }
    .timeline::before {
      content: ''; position: absolute; left: 0; top: 0; bottom: 0;
      width: 1px; background: rgba(110,231,197,.2);
    }
    .step-name { font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 4px; }
    .step-meta { display: flex; gap: 12px; flex-wrap: wrap; }
    .step-meta span { font-size: 11px; color: var(--muted); }
    .step-meta span strong { color: rgba(255,255,255,.6); }

    /* ── Decisions ── */
    .decision-card {
      background: var(--bg); border-radius: 12px; padding: 16px;
      margin-bottom: 12px; border: 1px solid var(--border);
    }
    .decision-title { font-size: 14px; font-weight: 700; color: var(--text); margin-bottom: 10px; }
    .decision-row { display: flex; gap: 10px; margin-bottom: 8px; flex-wrap: wrap; }
    .decision-label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .05em; color: var(--muted); min-width: 90px; padding-top: 1px; }
    .decision-val { font-size: 13px; color: rgba(255,255,255,.7); flex: 1; line-height: 1.5; }
    .decision-val.rec { color: var(--teal); font-weight: 600; }
    .decision-val.impact { color: var(--yellow); }

    /* ── Status bar ── */
    .status-bar {
      display: flex; align-items: center; gap: 8px;
      padding: 10px 16px; background: var(--surface2);
      border-top: 1px solid var(--border);
      font-size: 12px; color: var(--muted);
    }
    .status-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--muted); }
    .status-dot.running { background: var(--teal); animation: pulse 1.2s ease-in-out infinite; }
    .status-dot.done { background: var(--green); }
    .status-dot.error { background: var(--red); }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: .4; } }
  </style>
</head>
<body>

<header>
  <div class="logo">🏢</div>
  <div>
    <h1>Enterprise Onboarding Simulator</h1>
    <p>AI-powered architecture, risk, and onboarding plan generation</p>
  </div>
</header>

<div class="container">

  <!-- Input Form -->
  <div class="form-card">
    <h2>Company Profile</h2>
    <div class="form-grid">
      <div class="field">
        <label for="company">Company Name</label>
        <input id="company" type="text" placeholder="e.g. Acme Corp">
      </div>
      <div class="field">
        <label for="industry">Industry</label>
        <input id="industry" type="text" placeholder="e.g. FinTech, Healthcare, SaaS">
      </div>
      <div class="field">
        <label for="team_size">Team Size</label>
        <input id="team_size" type="text" placeholder="e.g. 200 employees, 12 engineers">
      </div>
      <div class="field">
        <label for="tech_stack">Current Tech Stack</label>
        <input id="tech_stack" type="text" placeholder="e.g. AWS, React, PostgreSQL, Salesforce">
      </div>
      <div class="field" style="grid-column: 1 / -1;">
        <label for="goals">Implementation Goals</label>
        <textarea id="goals" placeholder="e.g. Migrate from on-prem to cloud, integrate with Salesforce, improve team onboarding speed by 40%"></textarea>
      </div>
    </div>
    <button class="run-btn" id="run-btn" onclick="runSimulation()">⚡ Run Simulation</button>
  </div>

  <!-- Output -->
  <div class="output-section" id="output-section">

    <!-- Live Log -->
    <div class="log-panel">
      <div class="log-header">
        <div class="dot red"></div><div class="dot yellow"></div><div class="dot green"></div>
        <span class="log-title">simulation.log</span>
      </div>
      <div class="log-body" id="log-body"></div>
      <div class="status-bar">
        <div class="status-dot" id="status-dot"></div>
        <span id="status-text">Idle</span>
      </div>
    </div>

    <!-- Results -->
    <div class="results-panel">
      <div class="tabs">
        <button class="tab active" onclick="showTab('architecture', this)">🏗 Architecture</button>
        <button class="tab" onclick="showTab('risks', this)">⚠️ Risks</button>
        <button class="tab" onclick="showTab('onboarding', this)">📋 Onboarding Plan</button>
        <button class="tab" onclick="showTab('decisions', this)">🔀 Decisions</button>
      </div>
      <div class="tab-content" id="tab-content">
        <div class="placeholder">
          <div class="placeholder-icon">⚡</div>
          <div>Run a simulation to see results</div>
        </div>
      </div>
    </div>

  </div>
</div>

<script>
let parsed = {};
let activeTab = 'architecture';

function showTab(name, btn) {
  activeTab = name;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  renderTab(name);
}

function setStatus(state, text) {
  const dot = document.getElementById('status-dot');
  dot.className = 'status-dot ' + state;
  document.getElementById('status-text').textContent = text;
}

async function runSimulation() {
  const company   = document.getElementById('company').value.trim();
  const industry  = document.getElementById('industry').value.trim();
  const team_size = document.getElementById('team_size').value.trim();
  const tech_stack= document.getElementById('tech_stack').value.trim();
  const goals     = document.getElementById('goals').value.trim();

  if (!company || !industry || !goals) {
    alert('Please fill in at least Company, Industry, and Goals.');
    return;
  }

  const btn = document.getElementById('run-btn');
  btn.disabled = true;
  btn.textContent = '⏳ Running…';

  const log = document.getElementById('log-body');
  log.textContent = '';
  parsed = {};

  const output = document.getElementById('output-section');
  output.classList.add('visible');

  const cursor = document.createElement('span');
  cursor.className = 'cursor';

  setStatus('running', 'Generating simulation…');

  let fullText = '';

  try {
    const res = await fetch('/api/v1/simulate', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ company, industry, team_size, tech_stack, goals })
    });

    if (!res.ok) throw new Error(`Server error: ${res.status}`);

    const reader = res.body.getReader();
    const decoder = new TextDecoder();

    log.appendChild(cursor);

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      const chunk = decoder.decode(value, { stream: true });
      fullText += chunk;
      log.insertBefore(document.createTextNode(chunk), cursor);
      log.scrollTop = log.scrollHeight;
    }

    cursor.remove();
    setStatus('done', 'Simulation complete');
    parsed = parseSections(fullText);
    renderTab(activeTab);

  } catch (err) {
    cursor.remove();
    log.textContent += '\n\n[ERROR] ' + err.message;
    setStatus('error', 'Error: ' + err.message);
  } finally {
    btn.disabled = false;
    btn.textContent = '⚡ Run Simulation';
  }
}

// ── Parsing ──────────────────────────────────────────────────────────────────

function parseSections(text) {
  const result = {};
  for (const [key, tag] of [
    ['architecture', 'ARCHITECTURE'],
    ['risks', 'RISKS'],
    ['onboarding', 'ONBOARDING_PLAN'],
    ['decisions', 'DECISIONS'],
  ]) {
    const m = text.match(new RegExp(`\\[${tag}\\]([\\s\\S]*?)\\[\\/${tag}\\]`));
    if (m) result[key] = m[1].trim();
  }
  return result;
}

function pipeSplit(line) {
  return line.split('|').map(s => s.trim());
}

function dataRows(text) {
  return (text || '').split('\n').map(l => l.trim()).filter(l => l.includes('|'));
}

function esc(s) {
  return (s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ── Renderers ────────────────────────────────────────────────────────────────

function renderArchitecture(text) {
  const rows = dataRows(text);
  if (!rows.length) return '<div class="placeholder"><div>No architecture data parsed yet.</div></div>';
  return `<div class="arch-grid">${rows.map(row => {
    const [name, type, desc, priority] = pipeSplit(row);
    const p = (priority || 'medium').toLowerCase();
    return `<div class="arch-card ${p}">
      <div class="arch-name">${esc(name)}</div>
      <div class="arch-type">${esc(type)}</div>
      <div class="arch-desc">${esc(desc)}</div>
      <span class="badge ${p}">${esc(priority)}</span>
    </div>`;
  }).join('')}</div>`;
}

function renderRisks(text) {
  const rows = dataRows(text);
  if (!rows.length) return '<div class="placeholder"><div>No risk data parsed yet.</div></div>';
  return `<table class="risk-table">
    <thead><tr><th>Risk</th><th>Severity</th><th>Probability</th><th>Mitigation</th></tr></thead>
    <tbody>${rows.map(row => {
      const [risk, severity, prob, mitigation] = pipeSplit(row);
      const s = (severity || 'medium').toLowerCase();
      return `<tr>
        <td class="risk-name">${esc(risk)}</td>
        <td><span class="badge ${s}">${esc(severity)}</span></td>
        <td><span class="badge ${(prob||'medium').toLowerCase()}">${esc(prob)}</span></td>
        <td class="mitigation">${esc(mitigation)}</td>
      </tr>`;
    }).join('')}</tbody>
  </table>`;
}

function renderOnboarding(text) {
  const rows = dataRows(text);
  if (!rows.length) return '<div class="placeholder"><div>No onboarding data parsed yet.</div></div>';

  const phases = {};
  for (const row of rows) {
    const [phase, step, duration, owner, depends] = pipeSplit(row);
    if (!phase) continue;
    if (!phases[phase]) phases[phase] = [];
    phases[phase].push({ step, duration, owner, depends });
  }

  return `<div class="timeline">${Object.entries(phases).map(([phase, steps]) => `
    <div class="phase-group">
      <div class="phase-label">${esc(phase)}</div>
      ${steps.map(s => `<div class="timeline-item">
        <div class="step-name">${esc(s.step)}</div>
        <div class="step-meta">
          <span>⏱ <strong>${esc(s.duration)}</strong></span>
          <span>👤 <strong>${esc(s.owner)}</strong></span>
          ${s.depends && s.depends !== 'None' ? `<span>↳ <strong>${esc(s.depends)}</strong></span>` : ''}
        </div>
      </div>`).join('')}
    </div>`).join('')}
  </div>`;
}

function renderDecisions(text) {
  const rows = dataRows(text);
  if (!rows.length) return '<div class="placeholder"><div>No decision data parsed yet.</div></div>';
  return rows.map(row => {
    const [title, options, rec, impact] = pipeSplit(row);
    return `<div class="decision-card">
      <div class="decision-title">🔀 ${esc(title)}</div>
      <div class="decision-row"><span class="decision-label">Options</span><span class="decision-val">${esc(options)}</span></div>
      <div class="decision-row"><span class="decision-label">Recommend</span><span class="decision-val rec">${esc(rec)}</span></div>
      <div class="decision-row"><span class="decision-label">Impact</span><span class="decision-val impact">${esc(impact)}</span></div>
    </div>`;
  }).join('');
}

function renderTab(name) {
  const el = document.getElementById('tab-content');
  if (!parsed[name]) {
    el.innerHTML = `<div class="placeholder"><div class="placeholder-icon">⏳</div><div>Waiting for simulation data…</div></div>`;
    return;
  }
  const renderers = {
    architecture: renderArchitecture,
    risks: renderRisks,
    onboarding: renderOnboarding,
    decisions: renderDecisions,
  };
  el.innerHTML = renderers[name](parsed[name]);
}
</script>
</body>
</html>
